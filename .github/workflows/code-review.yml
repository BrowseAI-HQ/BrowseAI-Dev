name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.py' ':!pnpm-lock.yaml' ':!dist/' | head -c 30000 > /tmp/pr_diff.txt

      - name: Review with Claude via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)

          PROMPT="You are a senior code reviewer for BrowseAI Dev, an open-source research infrastructure project for AI agents (TypeScript/React/Fastify monorepo).

          Review this PR diff. Focus on:
          1. Security issues (XSS, injection, leaked secrets)
          2. Bugs or logic errors
          3. Breaking changes to API or SDK
          4. Performance concerns

          Skip style nitpicks. If the code looks good, say so briefly.

          PR: ${{ github.event.pull_request.title }}

          Diff:
          ${DIFF}"

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              "model": "google/gemini-2.5-flash",
              "max_tokens": 1500,
              "messages": [{"role": "user", "content": $prompt}]
            }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Review failed — check OPENROUTER_API_KEY secret."')
          echo "$REVIEW" > /tmp/review.txt

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8').trim();
            if (review && !review.startsWith('Review failed')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## AI Code Review\n\n${review}\n\n---\n*Automated review by Gemini 2.5 Flash via OpenRouter*`
              });
            }
